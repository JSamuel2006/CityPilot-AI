###############################################################################
# CityPilot AI — Render Deployment Configuration
# Docs: https://render.com/docs/blueprint-spec
###############################################################################

services:
  # ── FastAPI Backend Web Service ──────────────────────────────────────────
  - type: web
    name: citypilot-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    region: oregon
    plan: free

    # Environment variables
    envVars:
      # DATABASE_URL is automatically injected by the fromDatabase block below
      - key: DATABASE_URL
        fromDatabase:
          name: citypilot-db
          property: connectionString

      - key: GEMINI_API_KEY
        sync: false   # Set manually in Render dashboard

      - key: SECRET_KEY
        generateValue: true  # Render generates a secure random value

      - key: CORS_ORIGINS
        # Replace with your Vercel frontend URL after first deploy:
        # e.g. https://citypilot-ai.vercel.app
        value: "*"

      - key: UPLOAD_DIR
        value: /tmp/uploads

      - key: PYTHON_VERSION
        value: "3.12"

    healthCheckPath: /

  # ── Render-managed PostgreSQL Database ───────────────────────────────────
databases:
  - name: citypilot-db
    region: oregon
    plan: free
    databaseName: citypilot
    user: citypilot_user
